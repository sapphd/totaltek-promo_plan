# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: com.kcc.promoplan
type: application
framework:
  name: SAPUI5
  version: 1.138.0
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        backend:
          - path: /sap
            url: http://sapdd4-virtual.kcc.com:60010
            destination: DD4
          - url: http://sapdd4-virtual.kcc.com:60010
            client: '200'
            destination: DD4
            path: /sap/opu/odata/sap/APS_CHANGE_DOCUMENTS_SRV/
    - name: sap-fe-mockserver
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /sap/opu/odata/sap/ZSRV_TP4_PLAN_HDR
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/ZSRV_TP4_PROMO_PLAN
            metadataPath: ./webapp/localService/PromoPlan/metadata.xml
            mockdataPath: ./webapp/localService/PromoPlan/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/ZPRTP4_PLAN_COPY_SRV
            metadataPath: ./webapp/localService/PromoCopy/metadata.xml
            mockdataPath: ./webapp/localService/PromoCopy/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/ZTP4_API_COMMENTS_SRV
            metadataPath: ./webapp/localService/CommentsService/metadata.xml
            mockdataPath: ./webapp/localService/CommentsService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/APS_CHANGE_DOCUMENTS_SRV
            metadataPath: ./webapp/localService/APS_CHANGE_DOCUMENTS_SRV/metadata.xml
            mockdataPath: ./webapp/localService/APS_CHANGE_DOCUMENTS_SRV/data
            generateMockData: true
        annotations:
          - localPath: ./webapp/localService/PromoPlan/ZPRTP4_PROMO_PLAN_ANNO_MDL.xml
            urlPath: /sap/opu/odata/IWFND/CATALOGSERVICE;v=2/Annotations(TechnicalName='ZPRTP4_PROMO_PLAN_ANNO_MDL',Version='0001')/$value/
          - localPath: ./webapp/localService/APS_CHANGE_DOCUMENTS_SRV/APS_CHANGE_DOCUMENTS_ANNO_MDL.xml
            urlPath: /sap/opu/odata/IWFND/CATALOGSERVICE;v=2/Annotations(TechnicalName='APS_CHANGE_DOCUMENTS_ANNO_MDL',Version='0001')/$value/
